# MBKRU — Next.js + Postgres (admin CMS: /admin)
# Run: docker compose up -d --build
# Entrypoint runs migrate + seed when DATABASE_URL is set (see docker-entrypoint.sh).
# Manual retry: Admin → Settings, or: docker compose exec mbkru-web npx prisma db seed

services:
  postgres:
    image: postgres:16-alpine
    container_name: mbkru-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mbkru}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mbkru_dev}
      POSTGRES_DB: ${POSTGRES_DB:-mbkru}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mbkru} -d ${POSTGRES_DB:-mbkru}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - mbkru

  mbkru-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:1100}
        NEXT_PUBLIC_PLATFORM_PHASE: ${NEXT_PUBLIC_PLATFORM_PHASE:-1}
    container_name: mbkru-website
    ports:
      - "${HOST_PORT:-1100}:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://localhost:1100}
      - NEXT_PUBLIC_PLATFORM_PHASE=${NEXT_PUBLIC_PLATFORM_PHASE:-1}
      - DATABASE_URL=${DATABASE_URL:-postgresql://mbkru:mbkru_dev@postgres:5432/mbkru}
      - ADMIN_SESSION_SECRET=${ADMIN_SESSION_SECRET}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - mbkru_uploads:/app/public/uploads
    restart: unless-stopped
    networks:
      - mbkru

volumes:
  postgres_data:
  mbkru_uploads:

networks:
  mbkru:
    driver: bridge
