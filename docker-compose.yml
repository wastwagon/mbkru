# MBKRU — Next.js + Postgres + Redis (admin CMS: /admin)
# Default image build is Phase 3 (full Voice + report card). Override with NEXT_PUBLIC_PLATFORM_PHASE=1 for marketing-only.
# Run: docker compose up -d --build
# Entrypoint runs migrate + seed when DATABASE_URL is set (see docker-entrypoint.sh).
# Redis: used for shared rate limits and optional member session jti (Phase 2+).
# Manual retry: Admin → Settings, or: docker compose exec mbkru-web npx prisma db seed

services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - mbkru

  postgres:
    image: postgres:16-alpine
    container_name: mbkru-postgres
    ports:
      # High host port avoids clashing with local Postgres on 5432 and other tools on 5433.
      - "${POSTGRES_HOST_PORT:-55432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mbkru}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mbkru_dev}
      POSTGRES_DB: ${POSTGRES_DB:-mbkru}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mbkru} -d ${POSTGRES_DB:-mbkru}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - mbkru

  # Coolify: assign the public domain with internal port 3000, e.g.
  #   https://your-host.sslip.io:3000
  # (The :3000 tells the proxy to forward to this container’s port 3000; users still use 443.)
  mbkru-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:1100}
        NEXT_PUBLIC_PLATFORM_PHASE: ${NEXT_PUBLIC_PLATFORM_PHASE:-3}
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY}
        NEXT_PUBLIC_GA_MEASUREMENT_ID: ${NEXT_PUBLIC_GA_MEASUREMENT_ID}
        NEXT_PUBLIC_PLAUSIBLE_DOMAIN: ${NEXT_PUBLIC_PLAUSIBLE_DOMAIN}
        NEXT_PUBLIC_PLAUSIBLE_SCRIPT_URL: ${NEXT_PUBLIC_PLAUSIBLE_SCRIPT_URL}
    container_name: mbkru-website
    ports:
      - "${HOST_PORT:-1100}:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://localhost:1100}
      - NEXT_PUBLIC_PLATFORM_PHASE=${NEXT_PUBLIC_PLATFORM_PHASE:-3}
      - DATABASE_URL=${DATABASE_URL:-postgresql://mbkru:mbkru_dev@postgres:5432/mbkru}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - CONTACT_INBOX_EMAIL=${CONTACT_INBOX_EMAIL}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL}
      - TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY}
      - REPORT_ATTACHMENT_HMAC_SECRET=${REPORT_ATTACHMENT_HMAC_SECRET}
      - ADMIN_SESSION_SECRET=${ADMIN_SESSION_SECRET}
      - MEMBER_SESSION_SECRET=${MEMBER_SESSION_SECRET}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - SMS_PROVIDER=${SMS_PROVIDER}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_FROM_NUMBER=${TWILIO_FROM_NUMBER}
      # After migrations, docker-entrypoint.sh runs `prisma db seed` unless SKIP_DB_SEED=1.
      # Default 1 = hydrate public promises, report-card pilot, communities (set to 0 in Coolify only if you want an empty public catalogue).
      - SKIP_DB_SEED=${SKIP_DB_SEED:-}
      - SEED_ACCOUNTABILITY_DEMO=${SEED_ACCOUNTABILITY_DEMO:-1}
      - SEED_COMMUNITIES_DEMO=${SEED_COMMUNITIES_DEMO:-1}
      - SEED_TOWN_HALL_PROGRAMME=${SEED_TOWN_HALL_PROGRAMME:-1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - mbkru_uploads:/app/public/uploads
    restart: unless-stopped
    networks:
      - mbkru

volumes:
  postgres_data:
  redis_data:
  mbkru_uploads:

networks:
  mbkru:
    driver: bridge
