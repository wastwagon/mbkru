# MBKRU — Next.js + Postgres + Redis (admin CMS: /admin)
# Run: docker compose up -d --build
# Entrypoint runs migrate + seed when DATABASE_URL is set (see docker-entrypoint.sh).
# Redis: ready for Phase 2 (sessions/rate limits); app does not require REDIS_URL yet.
# Manual retry: Admin → Settings, or: docker compose exec mbkru-web npx prisma db seed

services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - mbkru

  postgres:
    image: postgres:16-alpine
    container_name: mbkru-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mbkru}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mbkru_dev}
      POSTGRES_DB: ${POSTGRES_DB:-mbkru}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mbkru} -d ${POSTGRES_DB:-mbkru}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - mbkru

  # Coolify: assign the public domain with internal port 3000, e.g.
  #   https://your-host.sslip.io:3000
  # (The :3000 tells the proxy to forward to this container’s port 3000; users still use 443.)
  mbkru-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:1100}
        NEXT_PUBLIC_PLATFORM_PHASE: ${NEXT_PUBLIC_PLATFORM_PHASE:-1}
    container_name: mbkru-website
    ports:
      - "${HOST_PORT:-1100}:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://localhost:1100}
      - NEXT_PUBLIC_PLATFORM_PHASE=${NEXT_PUBLIC_PLATFORM_PHASE:-1}
      - DATABASE_URL=${DATABASE_URL:-postgresql://mbkru:mbkru_dev@postgres:5432/mbkru}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - CONTACT_INBOX_EMAIL=${CONTACT_INBOX_EMAIL}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL}
      - ADMIN_SESSION_SECRET=${ADMIN_SESSION_SECRET}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - mbkru_uploads:/app/public/uploads
    restart: unless-stopped
    networks:
      - mbkru

volumes:
  postgres_data:
  redis_data:
  mbkru_uploads:

networks:
  mbkru:
    driver: bridge
