name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Release gates (Prisma + typecheck + unit tests)
        env:
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
        run: npm run verify:release-gates

      - name: Production build
        env:
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_SITE_URL: https://example.com
          NEXT_PUBLIC_PLATFORM_PHASE: "3"
          MEMBER_SESSION_SECRET: ci-member-session-secret-must-be-32-chars-min
        run: npm run build

      - name: Lighthouse CI
        env:
          # Avoid live DB during audit — pages use empty-roster / placeholder paths
          DATABASE_URL: ""
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          NEXT_PUBLIC_PLATFORM_PHASE: "3"
          MEMBER_SESSION_SECRET: ci-member-session-secret-must-be-32-chars-min
        run: npx --yes @lhci/cli@0.14.0 autorun --config=./lighthouserc.cjs
