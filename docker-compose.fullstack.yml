# Full stack: Next.js app + Postgres + Redis (three services).
# Local: copy .env.example to .env, set ADMIN_* and ADMIN_SESSION_SECRET, then:
#   docker compose -f docker-compose.fullstack.yml up --build
# First admin: docker compose exec mbkru-web npx prisma db seed
# Coolify: add as Docker Compose resource; set env vars in the UI (do not commit secrets).

services:
  mbkru-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:1100}
        NEXT_PUBLIC_PLATFORM_PHASE: ${NEXT_PUBLIC_PLATFORM_PHASE:-1}
    container_name: mbkru-website
    ports:
      - "${HOST_PORT:-1100}:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://localhost:1100}
      - NEXT_PUBLIC_PLATFORM_PHASE=${NEXT_PUBLIC_PLATFORM_PHASE:-1}
      - DATABASE_URL=${DATABASE_URL:-postgresql://mbkru:mbkru_dev@postgres:5432/mbkru}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_SESSION_SECRET=${ADMIN_SESSION_SECRET}
    volumes:
      - mbkru_uploads:/app/public/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - mbkru

  postgres:
    image: postgres:16-alpine
    container_name: mbkru-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mbkru}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mbkru_dev}
      POSTGRES_DB: ${POSTGRES_DB:-mbkru}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - mbkru

  redis:
    image: redis:7-alpine
    container_name: mbkru-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - mbkru

volumes:
  postgres_data:
  redis_data:
  mbkru_uploads:

networks:
  mbkru:
    driver: bridge
